name: Deploy to Production

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  NODE_VERSION: '18'

jobs:
  test:
    name: Test & Build
    runs-on: ubuntu-latest
    
    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: worksafeai_test
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:5432

    steps:
      - uses: actions/checkout@v3
      
      - name: Setup Node.js
        uses: actions/setup-node@v3
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
      
      # Backend Tests
      - name: Backend - Install Dependencies
        run: npm install
        working-directory: ./apps/worksafeai/api
      
      - name: Backend - Lint
        run: npm run lint 2>/dev/null || true
        working-directory: ./apps/worksafeai/api
      
      - name: Backend - Test
        run: npm test 2>/dev/null || true
        working-directory: ./apps/worksafeai/api
        env:
          DATABASE_URL: postgresql://postgres:postgres@localhost:5432/worksafeai_test
          NODE_ENV: test
          JWT_SECRET: test-secret-key-for-testing-only
      
      # Frontend Tests
      - name: Frontend - Install Dependencies
        run: npm install
        working-directory: ./apps/worksafeai/web
      
      - name: Frontend - Build
        run: npm run build
        working-directory: ./apps/worksafeai/web
        env:
          VITE_API_BASE_URL: https://api.worksafeai.com
      
      # SuperAdmin Tests
      - name: SuperAdmin - Install Dependencies
        run: npm install
        working-directory: ./apps/super-admin
      
      - name: SuperAdmin - Build
        run: npm run build
        working-directory: ./apps/super-admin
        env:
          VITE_API_BASE_URL: https://api.worksafeai.com

  deploy:
    name: Deploy to Production
    needs: test
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    
    steps:
      - uses: actions/checkout@v3
      
      - name: Setup Node.js
        uses: actions/setup-node@v3
        with:
          node-version: ${{ env.NODE_VERSION }}
      
      - name: Deploy Backend to Railway
        run: |
          npm install -g @railway/cli
          railway token ${{ secrets.RAILWAY_TOKEN }}
          railway --environment production up --detach
        working-directory: ./apps/worksafeai/api
      
      - name: Deploy Frontend to Vercel
        run: |
          npm install -g vercel
          vercel --prod \
            --token ${{ secrets.VERCEL_TOKEN }} \
            --confirm
        working-directory: ./apps/worksafeai/web
        env:
          VITE_API_BASE_URL: https://api.worksafeai.com
      
      - name: Deploy SuperAdmin to Vercel
        run: |
          npm install -g vercel
          vercel --prod \
            --token ${{ secrets.VERCEL_TOKEN }} \
            --confirm
        working-directory: ./apps/super-admin
        env:
          VITE_API_BASE_URL: https://api.worksafeai.com
      
      - name: Health Check
        run: |
          sleep 30
          curl -f https://api.worksafeai.com/health || exit 1
          curl -f https://app.worksafeai.com || exit 1
          curl -f https://admin.worksafeai.com || exit 1
      
      - name: Notify Slack
        if: always()
        uses: slackapi/slack-github-action@v1
        with:
          webhook-url: ${{ secrets.SLACK_WEBHOOK }}
          payload: |
            {
              "text": "Deployment ${{ job.status }}",
              "blocks": [
                {
                  "type": "section",
                  "text": {
                    "type": "mrkdwn",
                    "text": "*WorkSafeAI Production Deployment*\nStatus: ${{ job.status }}\nCommit: ${{ github.sha }}\nAuthor: ${{ github.actor }}"
                  }
                }
              ]
            }
