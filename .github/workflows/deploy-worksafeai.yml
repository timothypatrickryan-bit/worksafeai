name: Deploy WorkSafeAI to Vercel

on:
  push:
    branches: [main]

jobs:
  deploy-backend:
    name: Deploy Backend API
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Vercel CLI
        run: npm install -g vercel@latest

      - name: Deploy to Vercel
        run: vercel deploy --prod --yes --token ${{ secrets.VERVEL_TOKEN2 }}
        working-directory: apps/worksafeai/api

  deploy-frontend:
    name: Deploy Frontend
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Vercel CLI
        run: npm install -g vercel@latest

      - name: Deploy to Vercel
        run: vercel deploy --prod --yes --token ${{ secrets.VERVEL_TOKEN2 }}
        working-directory: apps/worksafeai/web

  deploy-admin:
    name: Deploy Admin Console
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Vercel CLI
        run: npm install -g vercel@latest

      - name: Deploy to Vercel
        run: vercel deploy --prod --yes --token ${{ secrets.VERVEL_TOKEN2 }}
        working-directory: apps/super-admin
