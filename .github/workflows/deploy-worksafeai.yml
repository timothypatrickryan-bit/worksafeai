name: Deploy WorkSafeAI to Vercel

on:
  push:
    branches: [main]

env:
  VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      
      - name: Deploy to Vercel
        run: |
          npm install -g vercel@latest
          cd apps/worksafeai/web && vercel deploy --prod --token $VERCEL_TOKEN --yes || true
          cd ../../..
          cd apps/super-admin && vercel deploy --prod --token $VERCEL_TOKEN --yes || true
          cd ../..
          cd apps/worksafeai/api && vercel deploy --prod --token $VERCEL_TOKEN --yes || true
