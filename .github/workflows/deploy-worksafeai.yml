name: Deploy WorkSafeAI to Vercel

on:
  push:
    branches: [main]
    paths:
      - 'apps/worksafeai/**'
  pull_request:
    branches: [main]
    paths:
      - 'apps/worksafeai/**'

env:
  VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}

jobs:
  test-backend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      - uses: actions/setup-node@v3
        with:
          node-version: '18'
          cache: 'npm'
      
      - name: Install backend dependencies
        run: cd apps/worksafeai/api && npm ci
      
      - name: Run syntax check
        run: cd apps/worksafeai/api && node -c src/server.js && echo "✓ Backend syntax valid"
        continue-on-error: true

  deploy-backend:
    needs: test-backend
    if: github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      - uses: actions/setup-node@v3
        with:
          node-version: '18'
      
      - name: Deploy backend to Vercel
        run: |
          cd apps/worksafeai/api
          npx vercel deploy --prod --token ${{ secrets.VERCEL_TOKEN }}

  deploy-frontend:
    needs: test-backend
    if: github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      - uses: actions/setup-node@v3
        with:
          node-version: '18'
      
      - name: Deploy frontend to Vercel
        run: |
          cd apps/worksafeai/web
          npx vercel deploy --prod --token ${{ secrets.VERCEL_TOKEN }}

  deploy-admin:
    needs: test-backend
    if: github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      - uses: actions/setup-node@v3
        with:
          node-version: '18'
      
      - name: Deploy admin console to Vercel
        run: |
          cd apps/super-admin
          npx vercel deploy --prod --token ${{ secrets.VERCEL_TOKEN }}
